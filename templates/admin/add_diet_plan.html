{% extends "base.html" %}

{% block title %}Add Diet Plan - Admin{% endblock %}

{% block content %}
<div class="container py-5">
    <div class="row justify-content-center">
        <div class="col-lg-8">
            <div class="card border-0 shadow-sm">
                <div class="card-header bg-white border-0">
                    <h3 class="mb-0">
                        <i class="fas fa-plus text-info me-2"></i>Add New Diet Plan
                    </h3>
                </div>
                <div class="card-body">
                    <form method="POST" enctype="multipart/form-data">
                        <!-- Basic Information -->
                        <div class="row mb-4">
                            <div class="col-md-6">
                                <label for="name" class="form-label">Plan Name *</label>
                                <input type="text" class="form-control" id="name" name="name" required>
                            </div>
                            <div class="col-md-6">
                                <label for="goal" class="form-label">Goal</label>
                                <select class="form-select" id="goal" name="goal">
                                    <option value="">Select Goal</option>
                                    <option value="Weight Loss">Weight Loss</option>
                                    <option value="Muscle Gain">Muscle Gain</option>
                                    <option value="Maintenance">Maintenance</option>
                                    <option value="General Health">General Health</option>
                                    <option value="Athletic Performance">Athletic Performance</option>
                                </select>
                            </div>
                        </div>
                        
                        <div class="mb-4">
                            <label for="description" class="form-label">Description</label>
                            <textarea class="form-control" id="description" name="description" rows="3"></textarea>
                        </div>
                        
                        <div class="row mb-4">
                            <div class="col-md-6">
                                <label for="image" class="form-label">Plan Image</label>
                                <input type="file" class="form-control" id="image" name="image" accept="image/*">
                            </div>
                            <div class="col-md-6">
                                <div class="form-check mt-4">
                                    <input class="form-check-input" type="checkbox" id="is_public" name="is_public" checked>
                                    <label class="form-check-label" for="is_public">
                                        Make this plan public
                                    </label>
                                </div>
                            </div>
                        </div>
                        
                        <hr class="my-4">
                        
                        <!-- Meals Section -->
                        <h5 class="mb-3">
                            <i class="fas fa-utensils text-info me-2"></i>Meals
                        </h5>
                        <div id="meals-container">
                            <!-- Meal 1 -->
                            <div class="meal-entry border rounded p-3 mb-3">
                                <div class="row">
                                    <div class="col-md-6">
                                        <label class="form-label">Meal Name *</label>
                                        <input type="text" class="form-control" name="meal_name_1" required>
                                    </div>
                                    <div class="col-md-6">
                                        <label class="form-label">Meal Type</label>
                                        <select class="form-select" name="meal_type_1">
                                            <option value="Breakfast">Breakfast</option>
                                            <option value="Lunch">Lunch</option>
                                            <option value="Dinner">Dinner</option>
                                            <option value="Snack">Snack</option>
                                            <option value="Pre-workout">Pre-workout</option>
                                            <option value="Post-workout">Post-workout</option>
                                        </select>
                                    </div>
                                </div>
                                <div class="row mt-2">
                                    <div class="col-md-6">
                                        <label class="form-label">Calories</label>
                                        <input type="number" class="form-control" name="meal_calories_1" min="0">
                                    </div>
                                    <div class="col-md-6">
                                        <label class="form-label">Foods/Ingredients</label>
                                        <input type="text" class="form-control" name="meal_foods_1" placeholder="e.g., Oatmeal, banana, protein powder">
                                    </div>
                                </div>
                                <div class="mt-2">
                                    <label class="form-label">Notes</label>
                                    <textarea class="form-control" name="meal_notes_1" rows="2" placeholder="Optional notes about this meal"></textarea>
                                </div>
                            </div>
                        </div>
                        
                        <div class="mb-4">
                            <button type="button" class="btn btn-outline-info" onclick="addMeal()">
                                <i class="fas fa-plus me-2"></i>Add Another Meal
                            </button>
                        </div>
                        
                        <!-- Submit Buttons -->
                        <div class="d-flex gap-2">
                            <button type="submit" class="btn btn-info">
                                <i class="fas fa-save me-2"></i>Create Diet Plan
                            </button>
                            <a href="{{ url_for('admin_diet_plans') }}" class="btn btn-outline-secondary">
                                <i class="fas fa-times me-2"></i>Cancel
                            </a>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>

<script>
let mealCount = 1;

function addMeal() {
    mealCount++;
    const container = document.getElementById('meals-container');
    const mealDiv = document.createElement('div');
    mealDiv.className = 'meal-entry border rounded p-3 mb-3';
    mealDiv.innerHTML = `
        <div class="row">
            <div class="col-md-6">
                <label class="form-label">Meal Name *</label>
                <input type="text" class="form-control" name="meal_name_${mealCount}" required>
            </div>
            <div class="col-md-6">
                <label class="form-label">Meal Type</label>
                <select class="form-select" name="meal_type_${mealCount}">
                    <option value="Breakfast">Breakfast</option>
                    <option value="Lunch">Lunch</option>
                    <option value="Dinner">Dinner</option>
                    <option value="Snack">Snack</option>
                    <option value="Pre-workout">Pre-workout</option>
                    <option value="Post-workout">Post-workout</option>
                </select>
            </div>
        </div>
        <div class="row mt-2">
            <div class="col-md-6">
                <label class="form-label">Calories</label>
                <input type="number" class="form-control" name="meal_calories_${mealCount}" min="0">
            </div>
            <div class="col-md-6">
                <label class="form-label">Foods/Ingredients</label>
                <input type="text" class="form-control" name="meal_foods_${mealCount}" placeholder="e.g., Oatmeal, banana, protein powder">
            </div>
        </div>
        <div class="mt-2">
            <label class="form-label">Notes</label>
            <textarea class="form-control" name="meal_notes_${mealCount}" rows="2" placeholder="Optional notes about this meal"></textarea>
        </div>
        <div class="mt-2">
            <button type="button" class="btn btn-outline-danger btn-sm" onclick="removeMeal(this)">
                <i class="fas fa-trash me-1"></i>Remove Meal
            </button>
        </div>
    `;
    container.appendChild(mealDiv);
}

function removeMeal(button) {
    button.closest('.meal-entry').remove();
}
</script>
{% endblock %}
