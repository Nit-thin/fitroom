{% extends 'base.html' %}
{% block title %}Log Meal{% endblock %}
{% block content %}
<div class="container py-5">
    <div class="row justify-content-center">
        <div class="col-lg-6">
            <div class="card shadow-sm">
                <div class="card-header bg-primary text-white">
                    <h4 class="mb-0">Log Meal for {{ diet_plan.name }}</h4>
                </div>
                <div class="card-body">
                    <form method="POST">
                        <div class="mb-3">
                            <label for="meal_type" class="form-label">Meal Type</label>
                            <input type="text" class="form-control" id="meal_type" name="meal_type" placeholder="Breakfast, Lunch, etc." required>
                        </div>
                        <div class="mb-3">
                            <label for="foods" class="form-label">Foods/Ingredients</label>
                            <textarea class="form-control" id="foods" name="foods" rows="2" required></textarea>
                        </div>
                        <div class="mb-3">
                            <label for="calories" class="form-label">Calories</label>
                            <input type="number" class="form-control" id="calories" name="calories" min="0">
                        </div>
                        <div class="mb-3">
                            <label for="notes" class="form-label">Notes</label>
                            <textarea class="form-control" id="notes" name="notes" rows="1"></textarea>
                        </div>
                        <button type="submit" class="btn btn-success">Log Meal</button>
                        <a href="{{ url_for('my_plans') }}" class="btn btn-secondary ms-2">Cancel</a>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
