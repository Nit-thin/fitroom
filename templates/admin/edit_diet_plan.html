{% extends "base.html" %}

{% block title %}Edit Diet Plan - Admin{% endblock %}

{% block content %}
<div class="container py-5">
    <div class="row justify-content-center">
        <div class="col-lg-8">
            <div class="card border-0 shadow-sm">
                <div class="card-header bg-white border-0">
                    <h3 class="mb-0">
                        <i class="fas fa-edit text-info me-2"></i>Edit Diet Plan: {{ plan.name }}
                    </h3>
                </div>
                <div class="card-body">
                    <form method="POST" enctype="multipart/form-data">
                        <!-- Basic Information -->
                        <div class="row mb-4">
                            <div class="col-md-6">
                                <label for="name" class="form-label">Plan Name *</label>
                                <input type="text" class="form-control" id="name" name="name" value="{{ plan.name }}" required>
                            </div>
                            <div class="col-md-6">
                                <label for="goal" class="form-label">Goal</label>
                                <select class="form-select" id="goal" name="goal">
                                    <option value="">Select Goal</option>
                                    <option value="Weight Loss" {% if plan.goal == 'Weight Loss' %}selected{% endif %}>Weight Loss</option>
                                    <option value="Muscle Gain" {% if plan.goal == 'Muscle Gain' %}selected{% endif %}>Muscle Gain</option>
                                    <option value="Maintenance" {% if plan.goal == 'Maintenance' %}selected{% endif %}>Maintenance</option>
                                    <option value="General Health" {% if plan.goal == 'General Health' %}selected{% endif %}>General Health</option>
                                    <option value="Athletic Performance" {% if plan.goal == 'Athletic Performance' %}selected{% endif %}>Athletic Performance</option>
                                </select>
                            </div>
                        </div>
                        
                        <div class="mb-4">
                            <label for="description" class="form-label">Description</label>
                            <textarea class="form-control" id="description" name="description" rows="3">{{ plan.description or '' }}</textarea>
                        </div>
                        
                        <div class="row mb-4">
                            <div class="col-md-6">
                                <label for="image" class="form-label">Plan Image</label>
                                <input type="file" class="form-control" id="image" name="image" accept="image/*">
                                {% if plan.image_url %}
                                <small class="text-muted">Current: {{ plan.image_url.split('/')[-1] }}</small>
                                {% endif %}
                            </div>
                            <div class="col-md-6">
                                <div class="form-check mt-4">
                                    <input class="form-check-input" type="checkbox" id="is_public" name="is_public" {% if plan.is_public %}checked{% endif %}>
                                    <label class="form-check-label" for="is_public">
                                        Make this plan public
                                    </label>
                                </div>
                            </div>
                        </div>
                        
                        <hr class="my-4">
                        
                        <!-- Meals Section -->
                        <h5 class="mb-3">
                            <i class="fas fa-utensils text-info me-2"></i>Meals
                        </h5>
                        <div id="meals-container">
                            {% for meal in meals %}
                            <div class="meal-entry border rounded p-3 mb-3">
                                <div class="row">
                                    <div class="col-md-6">
                                        <label class="form-label">Meal Name *</label>
                                        <input type="text" class="form-control" name="meal_name_{{ meal.id }}" value="{{ meal.name }}" required>
                                    </div>
                                    <div class="col-md-6">
                                        <label class="form-label">Meal Type</label>
                                        <select class="form-select" name="meal_type_{{ meal.id }}">
                                            <option value="Breakfast" {% if meal.meal_type == 'Breakfast' %}selected{% endif %}>Breakfast</option>
                                            <option value="Lunch" {% if meal.meal_type == 'Lunch' %}selected{% endif %}>Lunch</option>
                                            <option value="Dinner" {% if meal.meal_type == 'Dinner' %}selected{% endif %}>Dinner</option>
                                            <option value="Snack" {% if meal.meal_type == 'Snack' %}selected{% endif %}>Snack</option>
                                            <option value="Pre-workout" {% if meal.meal_type == 'Pre-workout' %}selected{% endif %}>Pre-workout</option>
                                            <option value="Post-workout" {% if meal.meal_type == 'Post-workout' %}selected{% endif %}>Post-workout</option>
                                        </select>
                                    </div>
                                </div>
                                <div class="row mt-2">
                                    <div class="col-md-6">
                                        <label class="form-label">Calories</label>
                                        <input type="number" class="form-control" name="meal_calories_{{ meal.id }}" value="{{ meal.calories or '' }}" min="0">
                                    </div>
                                    <div class="col-md-6">
                                        <label class="form-label">Foods/Ingredients</label>
                                        <input type="text" class="form-control" name="meal_foods_{{ meal.id }}" value="{{ meal.foods or '' }}" placeholder="e.g., Oatmeal, banana, protein powder">
                                    </div>
                                </div>
                                <div class="mt-2">
                                    <label class="form-label">Notes</label>
                                    <textarea class="form-control" name="meal_notes_{{ meal.id }}" rows="2" placeholder="Optional notes about this meal">{{ meal.notes or '' }}</textarea>
                                </div>
                            </div>
                            {% endfor %}
                        </div>
                        
                        <!-- Submit Buttons -->
                        <div class="d-flex gap-2">
                            <button type="submit" class="btn btn-info">
                                <i class="fas fa-save me-2"></i>Update Diet Plan
                            </button>
                            <a href="{{ url_for('admin_diet_plans') }}" class="btn btn-outline-secondary">
                                <i class="fas fa-times me-2"></i>Cancel
                            </a>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
