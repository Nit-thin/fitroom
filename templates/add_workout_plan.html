{% extends 'base.html' %}
{% block title %}Add Workout Plan{% endblock %}
{% block content %}
<div class="container py-5">
    <div class="row justify-content-center">
        <div class="col-lg-8">
            <div class="card shadow-sm">
                <div class="card-header bg-primary text-white">
                    <h4 class="mb-0">Create Workout Plan</h4>
                </div>
                <div class="card-body">
                    <form id="workoutPlanForm" method="POST" enctype="multipart/form-data">
                        <div class="mb-3">
                            <label for="name" class="form-label">Plan Name</label>
                            <input type="text" class="form-control" id="name" name="name" required>
                        </div>
                        <div class="mb-3">
                            <label for="goal" class="form-label">Goal</label>
                            <input type="text" class="form-control" id="goal" name="goal" placeholder="e.g. Fat Loss, Muscle Gain">
                        </div>
                        <div class="mb-3">
                            <label for="description" class="form-label">Description</label>
                            <textarea class="form-control" id="description" name="description" rows="3"></textarea>
                        </div>
                        <div class="mb-3">
                            <label for="image" class="form-label">Image</label>
                            <input class="form-control" type="file" id="image" name="image">
                        </div>
                        <div class="mb-3">
                            <label for="duration_days" class="form-label">Duration (days)</label>
                            <input type="number" class="form-control" id="duration_days" name="duration_days" min="1" value="30">
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Schedule Workouts</label>
                            <div id="planDaysList"></div>
                            <button type="button" class="btn btn-outline-primary mt-2" onclick="addPlanDay()">+ Add Day</button>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Make Public?</label>
                            <input type="checkbox" name="is_public" checked>
                        </div>
                        <button type="submit" class="btn btn-primary">Create Plan</button>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>
<script>
let dayCount = 0;
function addPlanDay() {
    dayCount++;
    const dayDiv = document.createElement('div');
    dayDiv.className = 'card mb-3';
    dayDiv.innerHTML = `
        <div class="card-body">
            <div class="d-flex justify-content-between align-items-center mb-2">
                <h6 class="mb-0">Day <span class="day-number">${dayCount}</span></h6>
                <button type="button" class="btn btn-sm btn-danger" onclick="this.closest('.card').remove()">Remove</button>
            </div>
            <div class="mb-2">
                <input type="text" class="form-control" name="day_workouts_${dayCount}" placeholder="Workouts for this day (comma separated workout names or IDs)" required>
            </div>
            <div class="mb-2">
                <textarea class="form-control" name="day_notes_${dayCount}" rows="1" placeholder="Notes (optional)"></textarea>
            </div>
        </div>
    `;
    document.getElementById('planDaysList').appendChild(dayDiv);
}
</script>
{% endblock %}
